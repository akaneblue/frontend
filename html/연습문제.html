<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
<!-- 하단 스타일 태그를 채워 문제를 풀어주시면 됩니다.-->
  <style>
    
    .wrap{
        max-width: 1200px;
        margin: 0 auto;
    }
    .header{
        margin: 0 auto;
        height: 150px;
        display: flex;
        flex-direction: column;
    }
    .header-top{
        height: 60%;
        display: flex;
    }
    #header-top1{
        width: 20%;
        height: 100%;
        border: 1px solid black;
    }
    #header-top2{
        width: 60%;
        height: 100%;
        border: 1px solid black;
    }
    #header-top3{
        width: 20%;
        height: 100%;
        border: 1px solid black;
    }
    .nav{
        margin: 7px 0px;
        border: 1px solid black;
    }
    #menu{
        display: flex;
        justify-content: space-between;
        margin: 10px 100px;
    }
    .content{
        height: 500px;
        display: flex;
        margin-bottom: 10px;
    }
    #content1{
        width: 30%;
        border: 1px solid black;
    }
    #content2{
        width: 40%;
        border: 1px solid black;
    }
    #content3{
        width: 30%;
        border: 1px solid black;
    }
    .footer{
        height: 100px;
        display: flex;
        flex-direction: column;
    }
    #footer1{
        width: 100%;
        height: 70%;
        border: 1px solid black;
    }
    #footer2{
        width: 100%;
        height: 30%;
        border: 1px solid black;
    }
  </style>
</head>
<body>
  
  <div class="wrap">


    <header class="header">

      <div class="header-top">
        <div id="header-top1"></div>
        <div id="header-top2"></div>
        <div id="header-top3"></div>
      </div>

      <nav class="nav">
        <ul id="menu">
          <li>Java</li>
          <li>Oracle</li>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
        </ul>
      </nav>
    </header>

    <section class="content">
      <div id="content1"></div>
      <div id="content2"></div>
      <div id="content3"></div>
    </section>

    <footer class="footer">
      <div id="footer1"></div>
      <div id="footer2"></div>
    </footer>
    
  </div>

</body>

</html>
