<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
        }
        .container{
            width: 80%;
            margin: 0 auto;
        }
        header{
            width: 100%;
            height: 200px;
            background-color: #ccc;
        }
        main{
            width: 100%;
            height: 70vh;
            background-color: bisque;
        }
        footer{
            width: 100%;
            height: 200px;
            background-color: aliceblue;
        }
        .banner{
            height: 60px;
            color: #fff;
            text-align: center;
            line-height: 60px;
            background-color: blueviolet;
            font-size: 1rem;
            font-weight: 700;
        }
        .flexbox{
            display: flex;
            justify-content: flex-end;
        }
        .quickmenu_item{
            width: 80px;
        }

        ul{
            list-style: none;
        }
        a{
            text-decoration: none;
            color: #333;
        }

        .top_quickmenu a{
            padding: 0 20px;
        }
        .logo{
            border: 1px solid red;
            height: 100px;
            background: url(https://comebello.com/web/upload/NNEditor/20251121/f6cff70867a8a89ab7705c3b1036d3ec.png) no-repeat center;

        }
        .logo_item{
            text-align: right;
            font-size: 1.5rem;
            height: 100px;
            line-height: 100px;
        }
        .logo_item i{
            padding: 20px 10px;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="banner">🚗 당일 배송</div>
            <div class="top_quickmenu flexbox">
                <a href="">로그인</a>
                <a href="">회원가입</a>
                <a href="">마이샵</a>
                <a href="">커뮤니티</a>
                <a href=""><img src="https://img.cafe24.com/img/common/global/ko_KR_18x12.png" alt=""> KR</a>
            </div>
            <!-- <div class="top_quickmenu">
                <ul class="flexbox">
                    <li class="quickmenu_item">로그인</li>
                    <li class="quickmenu_item">회원가입</li>
                    <li class="quickmenu_item">마이샵</li>
                    <li class="quickmenu_item">커뮤니티</li>
                    <li class="quickmenu_item"><img src="https://img.cafe24.com/img/common/global/ko_KR_18x12.png" alt=""> KR</li>
                </ul>
            </div> -->

            <div class="logo">
                <div class="logo_item">
                    <i class="bi bi-search"></i>
                    <i class="bi bi-box-arrow-in-left"></i>
                    <i class="bi bi-cart"></i>
                    <i class="bi bi-arrow-clockwise"></i>
                </div>
            </div>
        </header>
        <main>

        </main>
        <footer>

        </footer>
    </div>
</body>
</html>
