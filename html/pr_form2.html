<html lang="ko">
<head>

</head>

    <h3>지원동기</h3>
    <textarea name="" id="" rows="5" cols="60" placeholder="본사 지원 동기를 간략히 써 주세요."></textarea>
    <p></p>
    <input type="button" value="접수하기">
    <input type="button" value="다시쓰기">
